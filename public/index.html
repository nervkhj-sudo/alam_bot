<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL_REMOTE_MONITOR_v5.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght=400;700&family=Orbitron:wght=400;700;900&display=swap');
    </style>
    <style id="theme-style">
        body { font-family: 'Courier New', monospace; background-color: #050201; color: #ff5500; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(5, 2, 1, 0) 50%, rgba(0, 0, 0, 0.5) 50%); z-index: 99999; opacity: 0.4; pointer-events: none; background-size: 100% 8px; }
        .container { background-color: #0c0502; border: 2px solid #ff5500; box-shadow: 0 0 20px rgba(255, 85, 0, 0.15); width: 380px; padding: 20px; position: relative; margin: 0 auto; }
        h1 { color: #ff5500; border-bottom: 2px double #ff5500; text-align: center; font-size: 16px; padding-bottom: 8px; }
        .live-clock-wrapper { text-align: center; font-size: 26px; font-family: 'Orbitron', sans-serif; color: #ff5500; margin-bottom: 15px; }
        .data-box { border: 1px solid #aa3700; background: rgba(170, 55, 0, 0.05); padding: 12px; margin-bottom: 15px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .data-row span:last-child { color: #ffffff; font-weight: bold; }
        .condition-group { border: 1px solid #aa3700; background: rgba(12, 5, 2, 0.6); padding: 12px; margin-bottom: 12px; }
        .condition-title { color: #ff5500; font-weight: bold; font-size: 13px; display: flex; align-items: center; }
        .input-inline { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 6px; }
        select, input[type="number"], input[type="text"] { background-color: #050201; color: #ff5500; border: 1px solid #aa3700; height: 28px; text-align: center; }
        .btn-core { width: 100%; padding: 12px; font-weight: bold; background-color: #ff5500; color: #0c0502; border: none; cursor: pointer; font-size: 14px; }
        .status { text-align: center; font-size: 12px; margin-bottom: 10px; padding: 6px; border: 1px dashed #aa3700; color: #ff5500; }
        .log { background: #050201; border: 1px solid #aa3700; color: #aa3700; max-height: 100px; overflow-y: auto; padding: 8px; font-size: 11px; }
        .pnl-box { border: 1px double #aa3700; padding: 12px; margin-bottom: 15px; font-size: 12px; }
        .pnl-inputs { display: flex; justify-content: space-between; margin: 8px 0; }
        .pnl-inputs div { display: flex; flex-direction: column; width: 48%; gap: 2px; }
        .pnl-display { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-top: 4px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 4px; }
        .window-alias-box { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>MAGI_SYS://TACTICAL_MONITOR</h1>
    
    <div class="window-alias-box">
        <span>MONITOR_TAG:</span>
        <input type="text" id="window-alias" value="" oninput="onLocalSettingsChanged()">
    </div>

    <div class="live-clock-wrapper" id="live-clock">00:00:00</div>

    <div class="pnl-box">
        <select id="pnl-side" onchange="onLocalSettingsChanged()" style="width:100%; height:26px; margin-bottom:6px;">
            <option value="long">🟩 LONG (매수 포지션)</option>
            <option value="short" selected>🟥 SHORT (매도 포지션)</option>
        </select>
        <div class="pnl-inputs">
            <div><span>진입가 (USDT)</span><input type="number" id="pnl-entry-price" oninput="calculateLivePnl()"></div>
            <div><span>수량 (BTC)</span><input type="number" id="pnl-qty" step="0.001" oninput="calculateLivePnl()"></div>
        </div>
        <div class="pnl-display">
            <div>ROE: <span id="pnl-roe-val">0.00%</span></div>
            <div>PNL: <span id="pnl-amt-val">0.00 USDT</span></div>
        </div>
    </div>

    <div class="data-box">
        <div class="data-row"><span>MONITORING_PRICE :</span> <span id="current-price">연동 중...</span></div>
        <div class="data-row"><span>ANALYSIS_RSI(14):</span> <span id="current-rsi">-</span></div>
        <div class="data-row"><span>BOLL_BAND_LIMIT :</span> <span id="bb-status">-</span></div>
        <div class="data-row"><span>VOL / MA_RATIO  :</span> <span id="volume-status">-</span></div>
    </div>

    <div class="condition-group">
        <label class="condition-title"><input type="checkbox" id="cond-price-atv" onchange="onLocalSettingsChanged()"> PRICE_THRESHOLD</label>
        <div class="input-inline">
            <select id="cond-price-type" onchange="onLocalSettingsChanged()">
                <option value="above">PRICE ≥</option>
                <option value="below">PRICE ≤</option>
            </select>
            <input type="number" id="cond-price-val" style="width:110px;" oninput="onLocalSettingsChanged()"> USDT
        </div>
    </div>

    <div class="condition-group">
        <label class="condition-title"><input type="checkbox" id="cond-rsi-atv" onchange="onLocalSettingsChanged()"> RSI_INDEX_LIMIT</label>
        <div class="input-inline">
            <select id="cond-rsi-type" onchange="onLocalSettingsChanged()">
                <option value="above">RSI ≥</option>
                <option value="below" selected>RSI ≤</option>
            </select>
            <input type="number" id="cond-rsi-val" style="width:60px;" oninput="onLocalSettingsChanged()">
        </div>
    </div>

    <div class="condition-group">
        <span style="font-size:11px; display:block; margin-bottom:4px;">&gt; BOLLINGER BAND PARAMS</span>
        <div class="input-inline" style="margin-bottom:8px;">
            Std: <input type="number" id="cond-bb-std" style="width:50px;" oninput="onLocalSettingsChanged()">
        </div>
        <label class="condition-title"><input type="checkbox" id="cond-bb-upper-atv" onchange="onLocalSettingsChanged()"> UPPER_BAND_BREACH (상단 탈출)</label>
        <label class="condition-title" style="margin-top:6px;"><input type="checkbox" id="cond-bb-lower-atv" onchange="onLocalSettingsChanged()"> LOWER_BAND_BREACH (하단 이탈)</label>
    </div>

    <div class="condition-group">
        <label class="condition-title"><input type="checkbox" id="cond-vol-atv" onchange="onLocalSettingsChanged()"> QUANTITY_SPIKE</label>
        <div class="input-inline">
            <span>비율:</span> <input type="number" id="cond-vol-ratio" step="0.1" style="width:60px;" oninput="onLocalSettingsChanged()"> <span>배 이상</span>
        </div>
    </div>

    <div class="status" id="status-text">SYSTEM: OFF-LINE</div>
    <button class="btn-core" onclick="toggleSystem()" id="btn-toggle">CONNECTING...</button>
    
    <div class="log" id="log-box">시스템 초기화 대기 중...</div>
</div>

<script>
    let localConfig = null;
    let livePrice = 0;

    // 대시보드 전용 가상 시계 가동
    setInterval(() => {
        const d = new Date();
        document.getElementById('live-clock').innerText = 
            String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0');
    }, 1000);

    // 백엔드와 데이터 싱크 2초 주기로 동기화
    async function syncServer() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            
            // 1. 화면에 연산된 최신 지표 실시간 매핑
            livePrice = data.lastData.price;
            document.getElementById('current-price').innerText = livePrice > 0 ? livePrice.toLocaleString() + " USDT" : "로딩 중...";
            document.getElementById('current-rsi').innerText = data.lastData.rsi > 0 ? data.lastData.rsi.toFixed(1) : "-";
            document.getElementById('bb-status').innerText = data.lastData.bbUpper > 0 ? `${Math.floor(data.lastData.bbUpper)} / ${Math.floor(data.lastData.bbLower)}` : "-";
            document.getElementById('volume-status').innerText = data.lastData.volRatio > 0 ? `${data.lastData.volRatio.toFixed(1)}x` : "-";

            calculateLivePnl();

            // 2. 5분봉 마감 시 조건이 성립하여 백엔드 팝업 신호(triggerPopup)가 떨어지면 브라우저 경고창 트리거
            if (data.lastData.triggerPopup) {
                log(`💥 TARGET CONDITION MATCHED! Price: ${livePrice.toLocaleString()}`);
                alert(`🚨 [전략 만족 알람]\n노드: ${data.config.windowAlias}\n현재 5분봉 마감 조건이 만족되었습니다!\n가격: ${livePrice.toLocaleString()} USDT\nRSI: ${data.lastData.rsi.toFixed(1)}`);
            }

            // 인풋 UI 데이터 세팅값 동기화
            if (!localConfig || localConfig.isSystemRunning !== data.config.isSystemRunning) {
                document.getElementById('window-alias').value = data.config.windowAlias;
                document.getElementById('pnl-side').value = data.config.side;
                document.getElementById('cond-price-atv').checked = data.config.priceAtv;
                document.getElementById('cond-price-type').value = data.config.priceType;
                document.getElementById('cond-price-val').value = data.config.priceVal || Math.floor(livePrice);
                document.getElementById('cond-rsi-atv').checked = data.config.rsiAtv;
                document.getElementById('cond-rsi-type').value = data.config.rsiType;
                document.getElementById('cond-rsi-val').value = data.config.rsiVal;
                document.getElementById('cond-bb-std').value = data.config.bbStd;
                document.getElementById('cond-bb-upper-atv').checked = data.config.bbUpperAtv;
                document.getElementById('cond-bb-lower-atv').checked = data.config.bbLowerAtv;
                document.getElementById('cond-vol-atv').checked = data.config.volAtv;
                document.getElementById('cond-vol-ratio').value = data.config.volRatio;
            }

            localConfig = data.config;
            document.getElementById('status-text').innerText = localConfig.isSystemRunning ? "MAGI_ONLINE // MONITORING ACTIVE" : "SYSTEM: CLOUD_OFF_LINE";
            document.getElementById('btn-toggle').innerText = localConfig.isSystemRunning ? "TERMINATE MONITOR SYSTEM" : "ACTIVATE MAGI CLOUD";

        } catch (e) {
            document.getElementById('status-text').innerText = "CONNECT_FAULT";
        }
    }

    async function onLocalSettingsChanged() {
        if (!localConfig) return;
        const payload = {
            isSystemRunning: localConfig.isSystemRunning,
            windowAlias: document.getElementById('window-alias').value,
            side: document.getElementById('pnl-side').value,
            priceAtv: document.getElementById('cond-price-atv').checked,
            priceType: document.getElementById('cond-price-type').value,
            priceVal: parseFloat(document.getElementById('cond-price-val').value) || 0,
            rsiAtv: document.getElementById('cond-rsi-atv').checked,
            rsiType: document.getElementById('cond-rsi-type').value,
            rsiVal: parseFloat(document.getElementById('cond-rsi-val').value) || 30,
            bbStd: parseFloat(document.getElementById('cond-bb-std').value) || 2,
            bbUpperAtv: document.getElementById('cond-bb-upper-atv').checked,
            bbLowerAtv: document.getElementById('cond-bb-lower-atv').checked,
            volAtv: document.getElementById('cond-vol-atv').checked,
            volRatio: parseFloat(document.getElementById('cond-vol-ratio').value) || 1.5,
            telegramToken: localConfig.telegramToken,
            telegramChatId: localConfig.telegramChatId
        };
        await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    }

    async function toggleSystem() {
        if (!localConfig) return;
        localConfig.isSystemRunning = !localConfig.isSystemRunning;
        await onLocalSettingsChanged();
        log(localConfig.isSystemRunning ? "MONITORING SYSTEM ONLINE." : "SYSTEM SUSPENDED.");
        syncServer();
    }

    function calculateLivePnl() {
        const side = document.getElementById('pnl-side').value;
        const entry = parseFloat(document.getElementById('pnl-entry-price').value);
        const qty = parseFloat(document.getElementById('pnl-qty').value);
        if (!entry || !qty || livePrice <= 0) return;

        let amt = side === 'long' ? (livePrice - entry) * qty : (entry - livePrice) * qty;
        let roe = side === 'long' ? ((livePrice - entry) / entry) * 100 : ((entry - livePrice) / entry) * 100;

        document.getElementById('pnl-roe-val').innerText = `${roe >= 0 ? '+' : ''}${roe.toFixed(2)}%`;
        document.getElementById('pnl-amt-val').innerText = `${amt >= 0 ? '+' : ''}${amt.toLocaleString(undefined, {maximumFractionDigits:2})} USDT`;
    }

    function log(m) {
        const b = document.getElementById('log-box');
        b.innerHTML = `:: ${m}<br>` + b.innerHTML;
    }

    // 루틴 2초 주기 배치 가동
    syncServer();
    setInterval(syncServer, 2000);
</script>
</body>
</html>
